# Build cache
# https://docs.gradle.org/current/userguide/build_cache.html
org.gradle.caching=true

# Configuration cache
# https://docs.gradle.org/current/userguide/configuration_cache.html
org.gradle.configuration-cache=true

android.useAndroidX=true

org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8

# -----------------------------------------------------------
# Maven Central Publishing Credentials
# -----------------------------------------------------------
# Create an account at https://central.sonatype.com/ and generate
# a user token. Then set these values (or pass via CI secrets):
#
# sonatypeUser=
# sonatypePassword=
#
# GPG signing — either an in-memory ASCII-armored key:
# signingKey=
# signingPassword=
#
# Or a keyring file:
# signingKeyId=
# signingSecretKeyRingFile=
